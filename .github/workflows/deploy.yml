name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      # GitHub Pages sirve el sitio bajo /Reskyt/; el proyecto usa rutas
      # absolutas desde la raiz, asi que se reescriben tras el build.
      - name: Reescribir rutas absolutas al subpath /Reskyt
        run: |
          find dist \( -name '*.html' -o -name '*.css' -o -name '*.js' \) -print0 | xargs -0 sed -i \
            -e 's|href="/|href="/Reskyt/|g' \
            -e 's|src="/|src="/Reskyt/|g' \
            -e "s|url('/|url('/Reskyt/|g" \
            -e 's|url("/|url("/Reskyt/|g' \
            -e 's|url=/|url=/Reskyt/|g' \
            -e 's|"/_astro/|"/Reskyt/_astro/|g'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
